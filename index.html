<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>ManageMe - Jira Clone</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen p-4">
    <div id="app" class="max-w-6xl mx-auto">
      
      <header class="flex justify-between items-center mb-6 pb-4 border-b-2 border-gray-200 dark:border-gray-700">
        <div id="user-info" class="text-lg"></div>
        <div class="flex gap-4">
          <button id="theme-toggle" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
            🌓 Tryb Jasny/Ciemny
          </button>
          <button id="back-to-projects" class="hidden px-4 py-2 bg-slate-500 hover:bg-slate-600 text-white rounded-lg transition-colors">
            ⬅ Wróć do projektów
          </button>
        </div>
      </header>

      <section id="projects-section">
        <h1 class="text-3xl font-bold mb-6">Moje Projekty 🚀</h1>
        <form id="project-form" class="flex flex-col gap-4 bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm mb-8">
          <input type="text" id="name" placeholder="Nazwa projektu" required class="p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-transparent dark:text-white">
          <textarea id="description" placeholder="Opis projektu" required class="p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-transparent dark:text-white"></textarea>
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">Dodaj Projekt</button>
        </form>
        <div id="project-list-container">
          <h2 class="text-xl font-semibold mb-4">Wybierz projekt z listy:</h2>
          <ul id="project-list" class="space-y-4"></ul>
        </div>
      </section>

      <section id="active-project-section" class="hidden">
        <h1 id="active-project-name" class="text-3xl font-bold"></h1>
        <p id="active-project-desc" class="text-gray-600 dark:text-gray-400 mt-2 mb-6"></p>

        <form id="story-form" class="bg-blue-50 dark:bg-gray-800 p-6 rounded-xl border border-blue-100 dark:border-gray-700 mb-8 flex flex-col gap-4">
          <h3 class="text-xl font-bold">Dodaj nową historyjkę</h3>
          <input type="text" id="story-name" placeholder="Nazwa funkcjonalności" required class="p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white">
          <textarea id="story-desc" placeholder="Opis" class="p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white"></textarea>
          <select id="story-priority" class="p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white">
            <option value="low">Priorytet: Niski</option>
            <option value="medium" selected>Priorytet: Średni</option>
            <option value="high">Priorytet: Wysoki</option>
          </select>
          <button type="submit" class="bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">DODAJ HISTORYJKĘ</button>
        </form>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-gray-100 dark:bg-gray-800 p-4 rounded-xl"><h4 class="text-center font-bold mb-4">📝 TODO</h4><ul id="todo-list" class="space-y-4"></ul></div>
          <div class="bg-amber-50 dark:bg-amber-900/20 p-4 rounded-xl"><h4 class="text-center font-bold mb-4">⏳ DOING</h4><ul id="doing-list" class="space-y-4"></ul></div>
          <div class="bg-green-50 dark:bg-green-900/20 p-4 rounded-xl"><h4 class="text-center font-bold mb-4">✅ DONE</h4><ul id="done-list" class="space-y-4"></ul></div>
        </div>
      </section>

      <section id="active-story-section" class="hidden">
        <button id="back-to-project" class="mb-6 px-4 py-2 bg-slate-500 hover:bg-slate-600 text-white rounded-lg transition-colors">⬅ Wróć do tablicy projektu</button>
        <h2 class="text-2xl font-bold mb-6">Szczegóły historyjki: <span id="active-story-name" class="text-blue-600 dark:text-blue-400"></span></h2>
        
        <form id="task-form" class="bg-indigo-50 dark:bg-gray-800 p-6 rounded-xl border border-indigo-100 dark:border-gray-700 mb-8 flex flex-col gap-4">
          <h3 class="text-xl font-bold">Rozbij na zadania</h3>
          <input type="text" id="task-name" placeholder="Nazwa zadania" required class="p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white">
          <textarea id="task-desc" placeholder="Opis szczegółowy" class="p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white"></textarea>
          <div class="flex gap-4">
            <input type="number" id="task-time" placeholder="Czas (h)" required min="1" class="flex-1 p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white">
            <select id="task-priority" class="flex-1 p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white">
              <option value="low">Niski</option>
              <option value="medium" selected>Średni</option>
              <option value="high">Wysoki</option>
            </select>
          </div>
          <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">DODAJ ZADANIE</button>
        </form>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="border-2 border-dashed border-gray-300 dark:border-gray-700 p-4 rounded-xl"><h4 class="text-center font-bold mb-4">Brak przydziału (TODO)</h4><ul id="task-todo-list" class="space-y-4"></ul></div>
          <div class="border-2 border-dashed border-amber-300 dark:border-amber-700 p-4 rounded-xl"><h4 class="text-center font-bold mb-4">W pracy (DOING)</h4><ul id="task-doing-list" class="space-y-4"></ul></div>
          <div class="border-2 border-dashed border-green-300 dark:border-green-700 p-4 rounded-xl"><h4 class="text-center font-bold mb-4">Zakończone (DONE)</h4><ul id="task-done-list" class="space-y-4"></ul></div>
        </div>
      </section>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
