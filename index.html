<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ManageMe - Zarządzanie Projektami</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      
      <main>
        <header>
  <div>
    <h1>ManageMe</h1>
    <p>Zarządzanie projektami</p>
  </div>
  <div class="user-info">
    Zalogowany jako: <strong id="loggedUserName">Ładowanie...</strong>
  </div>
</header>

<main>
  <div id="projectDashboard">
    <section class="project-form">
        </section>
    <section class="project-list">
        <div id="projectsContainer"></div>
    </section>
  </div>

  <div id="activeProjectDashboard" style="display: none;">
    <button id="backToProjectsBtn">⬅ Powrót do listy projektów</button>
    <h2 id="activeProjectTitle">Nazwa Projektu</h2>
    
    <section class="story-form-section">
      <h3>Dodaj zadanie (Story)</h3>
      <form id="addStoryForm">
        <input type="text" id="storyName" placeholder="Tytuł zadania" required>
        <textarea id="storyDesc" placeholder="Opis" required></textarea>
        <select id="storyPriority">
          <option value="low">Niski</option>
          <option value="medium" selected>Średni</option>
          <option value="high">Wysoki</option>
        </select>
        <button type="submit">Dodaj historyjkę</button>
      </form>
    </section>

    <section class="kanban-board" style="display: flex; gap: 20px; margin-top: 20px;">
      <div class="column" style="flex: 1; border: 1px solid #ccc; padding: 10px;">
        <h3>To Do</h3>
        <div id="todoList"></div>
      </div>
      <div class="column" style="flex: 1; border: 1px solid #ccc; padding: 10px;">
        <h3>Doing</h3>
        <div id="doingList"></div>
      </div>
      <div class="column" style="flex: 1; border: 1px solid #ccc; padding: 10px;">
        <h3>Done</h3>
        <div id="doneList"></div>
      </div>
    </section>
  </div>
</main>
        <section class="project-form">
          <h2>Dodaj nowy projekt</h2>
          <form id="addProjectForm">
            <div class="form-group">
              <label for="projectName">Nazwa projektu:</label>
              <input type="text" id="projectName" name="name" required placeholder="Wprowadź nazwę projektu" />
            </div>
            <div class="form-group">
              <label for="projectDescription">Opis:</label>
              <textarea id="projectDescription" name="description" required placeholder="Wprowadź opis projektu"></textarea>
            </div>
            <button type="submit">Dodaj projekt</button>
          </form>
        </section>

        <section class="project-list">
          <h2>Lista projektów</h2>
          <div id="projectsContainer"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tss"></script>
  </body>
</html>
